<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFA → DFA Visualizer · Sign in</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* color/spacing tokens — kept here so they're easy to tweak */
    :root {
      --bg:       #0f1623;
      --surface:  #161f30;
      --text:     #e6e8ef;
      --text2:    #9aa3b8;
      --text3:    #5f6a82;
      --accent:   #7b68ee;
      --accent2:  #3ecfaa;
      --primary:  #2f6bff;
      --primary-h:#4a80ff;
      --danger:   #f05568;
      --border:   rgba(255,255,255,0.09);
      --border2:  rgba(255,255,255,0.18);
      --radius:   10px;
      --font-display: 'Syne', system-ui, sans-serif;
      --font-mono:    'IBM Plex Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* faint dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* center the card */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
    }

    /* gradient logo tile */
    .logo-tile {
      width: 84px;
      height: 84px;
      border-radius: 16px;
      margin: 0 auto 4px;
      background: linear-gradient(135deg, #8b55d6 0%, #5e3aa8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 30px;
      color: #fff;
      letter-spacing: -1px;
      box-shadow:
        0 10px 30px rgba(123,104,238,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18);
      user-select: none;
    }

    .logo-tile .arrow {
      font-size: 22px;
      margin: 0 2px;
      opacity: 0.9;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text3);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: -6px;
    }

    /* email input */
    .field label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text);
      background: #ffffff;
      color: #0f1623;
      border: 2px solid transparent;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder { color: #8a96ad; }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47,107,255,0.25);
    }

    .field input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(240,85,104,0.2);
    }

    /* "Let's Learn" button */
    .btn-primary {
      width: 100%;
      padding: 13px 16px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover { background: var(--primary-h); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* helper / error message under the input */
    .form-msg {
      min-height: 18px;
      font-size: 12px;
      margin-top: -10px;
      text-align: left;
      color: var(--danger);
      font-family: var(--font-mono);
    }

    .form-msg.info { color: var(--text3); }

    /* let the page scroll on tiny windows */
    @media (max-height: 600px) {
      body { overflow: auto; }
    }
  </style>
</head>
<body>

  <main>
    <form class="auth-card" id="auth-form" novalidate>

      <div class="logo-tile" aria-hidden="true">
        N<span class="arrow">→</span>D
      </div>

      <p class="subtitle">CSC 355 · Automata Visualizer</p>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="username"
          placeholder="yourname@asu.edu"
          spellcheck="false"
          autofocus
          required
        />
      </div>

      <p class="form-msg info" id="form-msg">Use your ASU email (@asu.edu) to continue.</p>

      <button type="submit" class="btn-primary" id="btn-submit">Let's Learn</button>
    </form>
  </main>

  <script>
    (function () {
      'use strict';

      const form    = document.getElementById('auth-form');
      const input   = document.getElementById('email');
      const msg     = document.getElementById('form-msg');
      const submit  = document.getElementById('btn-submit');

      const DEFAULT_MSG = 'Use your ASU email (@asu.edu) to continue.';

      // Apps Script web app — appends a row to my linked Google Sheet
      const LOG_URL = 'https://script.google.com/macros/s/AKfycbyorOq1rRQFQ3kZMDEwy0m3t5Ogx2pf691voZI5bAtKC4c5WdPW9foHH_B4ywi7IVLT/exec';

      // fire-and-forget log. text/plain + no-cors dodges the CORS
      // preflight that Apps Script can't handle; downside is we can't
      // read the response, which is fine since this is just logging.
      function logEmail(email) {
        try {
          fetch(LOG_URL, {
            method:  'POST',
            mode:    'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body:    JSON.stringify({ email: email, ua: navigator.userAgent }),
          }).catch(() => {});
        } catch (_) {}
      }

      // only allow well-formed addresses ending in @asu.edu
      function isAsuEmail(raw) {
        const val = (raw || '').trim().toLowerCase();
        const emailShape = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailShape.test(val)) return { ok: false, reason: 'shape' };
        if (!val.endsWith('@asu.edu')) return { ok: false, reason: 'domain' };
        return { ok: true, email: val };
      }

      function setError(text) {
        msg.textContent = text;
        msg.classList.remove('info');
        input.classList.add('invalid');
      }

      function clearError() {
        msg.textContent = DEFAULT_MSG;
        msg.classList.add('info');
        input.classList.remove('invalid');
      }

      // clear the error styling once they start typing again
      input.addEventListener('input', clearError);

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const result = isAsuEmail(input.value);

        if (!result.ok) {
          if (result.reason === 'shape') {
            setError('That doesn’t look like a valid email address.');
          } else {
            setError('Please sign in with your ASU email (must end in @asu.edu).');
          }
          input.focus();
          return;
        }

        // stash the email so app.html can gate access on it
        try { sessionStorage.setItem('asuUser', result.email); } catch (_) {}

        // log the sign-in to my Google Sheet (don't wait on it)
        logEmail(result.email);

        submit.disabled = true;
        submit.textContent = 'Loading…';
        window.location.href = 'app.html';
      });
    })();
  </script>
</body>
</html>
