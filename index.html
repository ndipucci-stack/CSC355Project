<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="pageTitle">NFA → DFA Visualizer · Sign in</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* design tokens */
    :root {
      --bg:       #0f1623;
      --surface:  #161f30;
      --text:     #e6e8ef;
      --text2:    #9aa3b8;
      --text3:    #5f6a82;
      --accent:   #7b68ee;
      --accent2:  #3ecfaa;
      --primary:  #2f6bff;
      --primary-h:#4a80ff;
      --danger:   #f05568;
      --border:   rgba(255,255,255,0.09);
      --border2:  rgba(255,255,255,0.18);
      --radius:   10px;
      --font-display: 'Syne', system-ui, sans-serif;
      --font-mono:    'IBM Plex Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* centered layout */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
    }

    /* logo tile */
    .logo-tile {
      width: 84px;
      height: 84px;
      border-radius: 16px;
      margin: 0 auto 4px;
      background: linear-gradient(135deg, #8b55d6 0%, #5e3aa8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 30px;
      color: #fff;
      letter-spacing: -1px;
      box-shadow:
        0 10px 30px rgba(123,104,238,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18);
      user-select: none;
    }

    .logo-tile .arrow {
      font-size: 22px;
      margin: 0 2px;
      opacity: 0.9;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text3);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-top: -6px;
    }

    /* language dropdown */
    .lang-wrap {
      align-self: center;
      position: relative;
    }

    .lang-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text3);
      pointer-events: none;
    }

    .lang-select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding: 6px 28px 6px 12px;
      border: 1px solid var(--border2);
      border-radius: 6px;
      background: var(--surface);
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .lang-select:hover,
    .lang-select:focus { color: var(--text); border-color: var(--accent); }

    .lang-select option {
      background: var(--surface);
      color: var(--text);
    }

    /* form */
    .field label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text);
      background: #ffffff;
      color: #0f1623;
      border: 2px solid transparent;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder { color: #8a96ad; }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47,107,255,0.25);
    }

    .field input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(240,85,104,0.2);
    }

    /* primary button */
    .btn-primary {
      width: 100%;
      padding: 13px 16px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover { background: var(--primary-h); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* inline form message */
    .form-msg {
      min-height: 18px;
      font-size: 12px;
      margin-top: -10px;
      text-align: left;
      color: var(--danger);
      font-family: var(--font-mono);
    }

    .form-msg.info { color: var(--text3); }

    /* footer */
    footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      font-size: 12px;
      color: var(--text3);
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }
    footer a:hover { color: var(--text); }

    footer .sep {
      width: 1px;
      height: 12px;
      background: var(--border2);
    }

    /* short-viewport fallback */
    @media (max-height: 600px) {
      body { overflow: auto; }
    }
  </style>
</head>
<body>

  <main>
    <form class="auth-card" id="auth-form" novalidate>

      <div class="logo-tile" aria-hidden="true">
        N<span class="arrow">→</span>D
      </div>

      <p class="subtitle" data-i18n="subtitle">CSC 355 · Automata Visualizer</p>

      <div class="lang-wrap">
        <select class="lang-select" id="lang-select" aria-label="Page language" data-i18n-aria="langAria">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>

      <div class="field">
        <label for="email" data-i18n="emailLabel">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="username"
          placeholder="yourname@asu.edu"
          data-i18n-placeholder="emailPlaceholder"
          spellcheck="false"
          autofocus
          required
        />
      </div>

      <p class="form-msg info" id="form-msg" data-i18n="defaultMsg">Use your ASU email (@asu.edu) to continue.</p>

      <button type="submit" class="btn-primary" id="btn-submit" data-i18n="submitBtn">Let's Learn</button>
    </form>
  </main>

  <footer>
    <a href="#" data-i18n="privacy">Privacy</a>
    <span class="sep" aria-hidden="true"></span>
    <a href="#" data-i18n="terms">Terms</a>
  </footer>

  <script>
    // hardcoded EN/ES strings for the landing page
    const I18N = {
      en: {
        pageTitle:        'NFA → DFA Visualizer · Sign in',
        subtitle:         'CSC 355 · Automata Visualizer',
        langAria:         'Page language',
        emailLabel:       'Email',
        emailPlaceholder: 'yourname@asu.edu',
        defaultMsg:       'Use your ASU email (@asu.edu) to continue.',
        submitBtn:        "Let's Learn",
        loadingBtn:       'Loading\u2026',
        errShape:         'That doesn\u2019t look like a valid email address.',
        errDomain:        'Please sign in with your ASU email (must end in @asu.edu).',
        privacy:          'Privacy',
        terms:            'Terms',
        htmlLang:         'en',
      },
      es: {
        pageTitle:        'Visualizador NFA → DFA · Iniciar sesión',
        subtitle:         'CSC 355 · Visualizador de Autómatas',
        langAria:         'Idioma de la página',
        emailLabel:       'Correo electrónico',
        emailPlaceholder: 'tunombre@asu.edu',
        defaultMsg:       'Usa tu correo de ASU (@asu.edu) para continuar.',
        submitBtn:        'Vamos a aprender',
        loadingBtn:       'Cargando\u2026',
        errShape:         'Eso no parece una dirección de correo válida.',
        errDomain:        'Inicia sesión con tu correo de ASU (debe terminar en @asu.edu).',
        privacy:          'Privacidad',
        terms:            'Términos',
        htmlLang:         'es',
      },
    };

    const STORAGE_KEY = 'landingLang';

    // current dictionary — exposed so the auth script can read error strings
    let dict = I18N.en;

    function applyLanguage(code) {
      const lang = I18N[code] ? code : 'en';
      dict = I18N[lang];

      document.documentElement.lang = dict.htmlLang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key] != null) el.textContent = dict[key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (dict[key] != null) el.setAttribute('placeholder', dict[key]);
      });
      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
        const key = el.getAttribute('data-i18n-aria');
        if (dict[key] != null) el.setAttribute('aria-label', dict[key]);
      });

      try { localStorage.setItem(STORAGE_KEY, lang); } catch (_) {}
    }

    // wire the dropdown and restore any saved choice
    (function () {
      'use strict';
      const langSelect = document.getElementById('lang-select');
      let saved = 'en';
      try { saved = localStorage.getItem(STORAGE_KEY) || 'en'; } catch (_) {}
      langSelect.value = I18N[saved] ? saved : 'en';
      applyLanguage(langSelect.value);

      langSelect.addEventListener('change', e => applyLanguage(e.target.value));
    })();

    // email gate
    (function () {
      'use strict';

      const form    = document.getElementById('auth-form');
      const input   = document.getElementById('email');
      const msg     = document.getElementById('form-msg');
      const submit  = document.getElementById('btn-submit');

      // accepts only well-formed addresses ending in @asu.edu
      function isAsuEmail(raw) {
        const val = (raw || '').trim().toLowerCase();
        const emailShape = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailShape.test(val)) return { ok: false, reason: 'shape' };
        if (!val.endsWith('@asu.edu')) return { ok: false, reason: 'domain' };
        return { ok: true, email: val };
      }

      function setError(text) {
        msg.textContent = text;
        msg.classList.remove('info');
        input.classList.add('invalid');
      }

      function clearError() {
        msg.textContent = dict.defaultMsg;
        msg.classList.add('info');
        input.classList.remove('invalid');
      }

      // reset error state as the user types
      input.addEventListener('input', clearError);

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const result = isAsuEmail(input.value);

        if (!result.ok) {
          setError(result.reason === 'shape' ? dict.errShape : dict.errDomain);
          input.focus();
          return;
        }

        // remember the session so app.html can gate access
        try { sessionStorage.setItem('asuUser', result.email); } catch (_) {}

        submit.disabled = true;
        submit.textContent = dict.loadingBtn;
        window.location.href = 'app.html';
      });
    })();
  </script>
</body>
</html>
